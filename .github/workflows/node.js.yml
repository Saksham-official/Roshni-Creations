name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Vite 7+ requires Node.js 20.19+ or 22.12+.[web:32][web:39]
        node-version: [ "20.19.0", "22.12.0" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          # Use exact versions that satisfy Vite's engine requirement.[web:32][web:37]
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        # Prefer npm ci when lockfile exists; fall back to install otherwise.[web:22]
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        # Your project uses Vite, so a build script must exist and should be required.
        run: npm run build

      - name: Test (if script exists)
        # This will run tests only if you define a "test" script in package.json.
        run: npm test --if-present
